<div class="page" id="drive">
    <div class="top-bar">
        <h1>📁 Google Drive</h1>
        <div style="display:flex;gap:8px;">
            <button class="btn btn-outline btn-sm" onclick="listarArquivosDrive('root')">
                <i class="fas fa-home"></i> Raiz
            </button>
            <button class="btn btn-outline btn-sm" onclick="listarArquivosDrive()">
                <i class="fas fa-sync-alt"></i> Atualizar
            </button>
        </div>
    </div>
    
    <div class="drive-panel">
        <h3><i class="fab fa-google-drive"></i> Meu Google Drive</h3>
        <p style="color:var(--text-muted);margin-bottom:15px;">Clique nas pastas para navegar • Clique nos arquivos para importar</p>
        
        <div class="drive-connect-area" id="driveConnectArea">
            <i class="fab fa-google-drive" style="font-size:4em;color:var(--text-muted);margin-bottom:15px;"></i>
            <h3>Carregando Google Drive...</h3>
            <p style="color:var(--text-muted);margin:10px 0;">Faça login para ver seus arquivos</p>
        </div>
        
        <div class="drive-files" id="driveFilesList" style="display:none;"></div>
    </div>
    
    <!-- Upload alternativo -->
    <div class="drive-panel" style="margin-top:20px;">
        <h3><i class="fas fa-upload"></i> Upload de Arquivo</h3>
        <p style="color:var(--text-muted);margin-bottom:15px;">Ou faça upload de um arquivo CSV do seu computador</p>
        <input type="file" id="localFile" accept=".csv" style="display:none;" onchange="importarLocal(event)">
        <button class="btn btn-outline" onclick="document.getElementById('localFile').click()">
            <i class="fas fa-file-upload"></i> Selecionar Arquivo CSV
        </button>
    </div>
</div>
